name: Release plugin zip

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build clean plugin zip
        run: |
          mkdir -p build/casa-vacanza-prenotazioni
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.zip' \
            --exclude='.DS_Store' \
            ./ build/casa-vacanza-prenotazioni/
          cd build
          zip -r casa-vacanza-prenotazioni.zip casa-vacanza-prenotazioni

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/casa-vacanza-prenotazioni.zip
          generate_release_notes: true
